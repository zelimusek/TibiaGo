services:
  postgres:
    image: postgres:16-alpine
    container_name: t-engine-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: t_engine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d t_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: npm run db:push
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/t_engine

  login-server:
    build: .
    container_name: t-engine-login
    command: npm run start:login
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/t_engine
      EXTERNAL_HOST: ws://localhost:2222
    ports:
      - "1337:1337"
    volumes:
      - .:/app
      - /app/node_modules

  game-engine:
    build: .
    container_name: t-engine-game
    command: npm run start
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/t_engine
      EXTERNAL_HOST: ws://localhost:2222
    ports:
      - "2222:2222"
    volumes:
      - .:/app
      - /app/node_modules

  asset-server:
    image: python:3.9-slim
    container_name: t-engine-assets
    working_dir: /app
    volumes:
      - .:/app
    environment:
      LOGIN_SERVER: http://login-server:1337
    ports:
      - "8000:8000"
    command: python3 client-server.py http

  # nginx comentado - usando nginx do sistema para SSL
  # nginx:
  #   image: nginx:alpine
  #   container_name: t-engine-nginx
